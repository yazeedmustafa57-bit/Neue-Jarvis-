name: Build JARVIS APK

on:
  push:
    branches: [main]
    paths:
      - 'jarvis_flutter/**'
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Accept Android Licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          flutter doctor --android-licenses || true

      - name: Flutter Doctor
        run: flutter doctor -v

      - name: Create .env
        working-directory: jarvis_flutter
        run: |
          if [ -n "${{ secrets.OPENAI_API_KEY }}" ]; then
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" > .env
          else
            echo "OPENAI_API_KEY=sk-placeholder" > .env
          fi

      - name: Pub Get
        working-directory: jarvis_flutter
        run: flutter pub get

      - name: Build APK
        working-directory: jarvis_flutter
        run: flutter build apk --release --android-skip-build-dependency-validation

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-release-apk
          path: jarvis_flutter/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
