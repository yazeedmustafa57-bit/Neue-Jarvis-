name: Build JARVIS APK

on:
  push:
    branches: [main]
    paths:
      - 'jarvis_flutter/**'
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Flutter Doctor
        run: flutter doctor -v

      - name: Create .env with API Key
        working-directory: jarvis_flutter
        run: |
          if [ -n "${{ secrets.OPENAI_API_KEY }}" ]; then
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" > .env
          else
            echo "OPENAI_API_KEY=sk-dein-openai-api-key-hier" > .env
          fi
          echo "✅ .env created"

      - name: Get Dependencies
        working-directory: jarvis_flutter
        run: flutter pub get

      - name: Build Release APK
        working-directory: jarvis_flutter
        run: flutter build apk --release

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-release-apk
          path: jarvis_flutter/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Build Split APKs
        working-directory: jarvis_flutter
        run: flutter build apk --release --split-per-abi

      - name: Upload Split APKs
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-split-apks-arm64
          path: jarvis_flutter/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          if-no-files-found: warn

      - name: Upload Split APKs armeabi
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-split-apks-armeabi
          path: jarvis_flutter/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          if-no-files-found: warn
