name: jarvis
description: JARVIS – Just A Rather Very Intelligent System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2

  # Voice
  speech_to_text: ^6.6.0
  flutter_tts: ^4.0.0

  # Database
  sqflite: ^2.3.0
  path: ^1.8.0

  # AI / HTTP
  http: ^1.1.0
  flutter_dotenv: ^5.1.0

  # Android Intents
  android_intent_plus: ^5.0.0

  # State management
  provider: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
